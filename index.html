<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>我們組的 Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="hearts">
    <div class="heart">❤️</div>
    <div class="heart">❤️</div>
    <div class="heart">❤️</div>
    <div class="heart">❤️</div>
    <div class="heart">❤️</div>
    <div class="heart">❤️</div>
  </div>

  <div class="container">
    <header>
      <h1>🤖 第 X 組的 Chatbot</h1>
      <p class="subtitle">W5 PR 協作練習</p>
    </header>

    <div id="chat-box">
      <div class="message bot">
        嗨！這是我們組用 PR 協作做出來的 Chatbot 🎉
      </div>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="輸入訊息...">
      <button onclick="sendMessage()">送出</button>
    </div>

    <footer></footer>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const text = input.value.trim();

      if (!text) return;

      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      // 組員 A 任務：在這裡加入時間戳
      userDiv.textContent = text;
      chatBox.appendChild(userDiv);

      const botDiv = document.createElement('div');
      botDiv.className = 'message bot';
      botDiv.textContent = `你說了「${text}」！`;
      chatBox.appendChild(botDiv);

      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendMessage();
    });

    // 組員 B 任務：在這裡加 clearChat() 函數
    // 組員 C 任務：在這裡加字數統計更新邏輯
    // 組員 D 任務：在這裡加深色模式切換函數

    // ── 搜尋對話功能 ──
    function searchMessages() {
      const keyword = document.getElementById('search-input').value.trim().toLowerCase();
      const messages = document.querySelectorAll('#chat-box .message');
      const countSpan = document.getElementById('search-result-count');
      const clearBtn = document.getElementById('clear-search-btn');
      let matchCount = 0;

      // 沒有關鍵字時，顯示全部訊息
      if (!keyword) {
        messages.forEach(msg => {
          msg.style.display = '';
          msg.innerHTML = msg.textContent; // 移除高亮
        });
        countSpan.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      clearBtn.style.display = 'inline-block';

      messages.forEach(msg => {
        const originalText = msg.textContent;
        const lowerText = originalText.toLowerCase();

        if (lowerText.includes(keyword)) {
          msg.style.display = '';
          matchCount++;
          // 高亮匹配文字
          const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
          msg.innerHTML = originalText.replace(regex, '<mark class="highlight">$1</mark>');
        } else {
          msg.style.display = 'none';
          msg.innerHTML = originalText; // 清除高亮
        }
      });

      countSpan.textContent = `找到 ${matchCount} 則訊息`;
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      searchMessages();
      document.getElementById('search-input').focus();
    }
  </script>

</body>

</html>
